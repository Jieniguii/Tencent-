<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #0d1133 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .container {
    text-align: center;
    padding: 40px 24px;
    max-width: 420px;
    width: 100%;
  }
  .check-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #00c853, #00e676);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    animation: scaleIn 0.5s ease-out;
  }
  .check-icon svg {
    width: 40px; height: 40px;
    fill: none;
    stroke: #fff;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  @keyframes scaleIn {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .qr-wrapper {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    display: inline-block;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .qr-wrapper img {
    width: 200px; height: 200px;
    display: block;
    border-radius: 4px;
  }
  .qr-label {
    margin-top: 12px;
    font-size: 13px;
    color: #666;
  }
  .highlight-box {
    background: linear-gradient(135deg, rgba(255,152,0,0.15), rgba(255,87,34,0.15));
    border: 1px solid rgba(255,152,0,0.4);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .highlight-box p {
    font-size: 15px;
    font-weight: 600;
    color: #ffab40;
    line-height: 1.7;
  }
  .highlight-box .important {
    color: #ff6d00;
    font-weight: 700;
  }
  .footer {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    margin-top: 20px;
  }
</style>
